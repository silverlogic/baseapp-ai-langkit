name: Lint & Tests & SonarCloud
run-name: ${{ github.actor }} is checking ${{ github.ref }} branch 🚀
on: [push, workflow_dispatch]
permissions:
  contents: read
  pull-requests: write
jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
        django-version: ["4.2", "5.2"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for sonarcloud

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: registry.tsl.io
          username: ${{ vars.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_TOKEN }}

      - name: docker compose build
        run: docker compose build --build-arg "PYTHON_VERSION=${{ matrix.python-version }}"

      - name: docker compose up
        run: cp .env.example .env && docker compose up -d --wait

      - name: flake8
        id: flake8
        run: docker compose exec web uv run --no-sync --python ${{ matrix.python-version }} flake8 ./ --show-source --statistics --count

      - name: isort
        id: isort
        if: steps.flake8.outcome == 'success'
        run: docker compose exec web uv run --no-sync --python ${{ matrix.python-version }} isort --check ./

      - name: black
        id: black
        if: steps.isort.outcome == 'success'
        run: docker compose exec web uv run --no-sync --python ${{ matrix.python-version }} black --check ./

      - name: pytest
        if: steps.black.outcome == 'success'
        # Right now the coverage is below 70%, so we can't run the coverage command.
        # After we cover more than 75%, we can run the coverage command.
        # docker compose exec web uv run --python ${{ matrix.python-version }} pytest --cov=./ --cov-report=xml --cov-branch .
        run: |
          docker compose exec web uv run --no-sync --python ${{ matrix.python-version }} pytest .
      
      - name: Install pip-audit
        if: steps.black.outcome == 'success' && startsWith(matrix.django-version, '5.2')
        run: docker compose exec web uv tool install --python ${{ matrix.python-version }} pip-audit
      # Ignored vulnerabilities:

      # Name                   Version ID             Fix Versions
      # ---------------------- ------- -------------- ------------
      # social-auth-app-django 5.4.3   CVE-2025-61783 5.6.0 => the reason for ignoring this vulnerability relates to https://github.com/silverlogic/baseapp-backend/pull/308
      # protobuf               6.33.4  CVE-2026-0994  => # there is no fix version available yet
      - name: Run pip-audit (installed dependencies)
        if: steps.black.outcome == 'success' && startsWith(matrix.django-version, '5.2')
        run: docker compose exec web pip-audit --skip-editable --ignore-vuln CVE-2025-61783 --ignore-vuln CVE-2026-0994 --ignore-vuln CVE-2026-4539

      # - name: SonarCloud Scan
      #   uses: SonarSource/sonarqube-scan-action@master
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: docker compose down
        run: docker compose down --volumes --remove-orphans
