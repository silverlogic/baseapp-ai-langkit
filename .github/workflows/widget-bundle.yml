name: Runner Topology Widget Bundle
run-name: ${{ github.actor }} is verifying the widget bundle on ${{ github.ref }}
on: [push, workflow_dispatch]
permissions:
  contents: read
jobs:
  bundle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baseapp_ai_langkit/runners/topology/widgets
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: baseapp_ai_langkit/runners/topology/widgets/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Build the bundle
        run: pnpm run build

      - name: Verify the committed bundle is up to date
        working-directory: ${{ github.workspace }}
        run: |
          git diff --exit-code -- \
            baseapp_ai_langkit/runners/static/runner_topology_widget.js \
            baseapp_ai_langkit/runners/static/runner_topology_widget.css \
            || (
              echo "::error::Committed widget bundle is out of date. Run \`pnpm run build\` inside baseapp_ai_langkit/runners/topology/widgets and commit the result." ;
              exit 1
            )
