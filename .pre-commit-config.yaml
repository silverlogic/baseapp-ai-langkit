repos:
-   repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (python)
-   repo: https://github.com/psf/black
    rev: 22.8.0
    hooks:
    - id: black
      language_version: python3
-   repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
    - id: flake8
-   repo: local
    hooks:
    -   id: pytest
        name: pytest
        entry: docker compose exec -T web pytest .
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]